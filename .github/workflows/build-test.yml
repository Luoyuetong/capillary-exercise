name: Build and Test

# 触发条件：推送到 main、或针对 main 的 PR
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    # 项目是 WinForms（net9.0-windows），必须用 Windows runner
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 .NET 9 SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. 还原依赖
      - name: Restore
        run: dotnet restore

      # 4. 编译（Release 配置）
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # 5. 运行测试
      #    SQLite 跨平台、无需额外驱动，单元测试与 Repository 测试均可在
      #    CI runner 上原生运行。仅过滤掉需要端到端组装的测试（Integration/E2E）。
      - name: Test (unit + repository)
        run: dotnet test --configuration Release --no-build --filter "Category!=Integration&Category!=E2E"

# 说明：
# - 单元测试（PickupService，用 NSubstitute Mock 依赖）→ CI 可跑
# - Repository 测试（SQLite 临时库，无需额外驱动）→ CI 可跑
# - 集成 / 端到端测试（需启动整套 Fake + 界面）→ 标记 Integration / E2E，CI 跳过，本地跑
# 这样 CI 保证"编译通过 + 核心业务逻辑与数据访问测试通过"，作为合并的最低门槛。
